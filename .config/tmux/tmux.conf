# Better prefix (Ctrl+a instead of Ctrl+b)
unbind C-b
set -g prefix C-space
bind C-space send-prefix

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Mouse support
set -g mouse on

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Intuitive splits (and open in current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Resize panes with Vim keys
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Faster escape time (important for Neovim)
set -sg escape-time 0

# Longer history
set -g history-limit 50000

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# --- Catppuccin Mocha Status Bar ---
set -g status-position top
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold] #S #[bg=#1e1e2e] "
set -g status-right "#[fg=#a6adc8]%H:%M  %d-%b #[bg=#89b4fa,fg=#1e1e2e,bold] #h "
set -g status-left-length 30
set -g status-right-length 50

# Window status
setw -g window-status-format "#[fg=#6c7086] #I:#W "
setw -g window-status-current-format "#[fg=#89b4fa,bold] #I:#W "

# Pane borders
set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=#89b4fa"

# Message style
set -g message-style "bg=#1e1e2e,fg=#cdd6f4"
