# Minimal Catppuccin-inspired prompt
format = """
$directory\
$git_branch\
$git_status\
$character"""

[directory]
style = "bold blue"
truncation_length = 3

[git_branch]
style = "bold mauve"
format = "[$symbol$branch]($style) "
symbol = " "

[git_status]
style = "bold red"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
